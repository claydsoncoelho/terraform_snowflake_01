# configs/governance_security/database_grants/prod_database_grants.yaml

# This file defines the database grants for various roles in the system.
# Each entry specifies the database, role, and the privilege granted to that role for the specified database.
# The privileges can include "ALL PRIVILEGES", "USAGE", or other specific privileges as needed.

# PROD ENVIRONMENT GRANTS
# PROD_RAW
- database: "PROD_RAW"
  role: "PROD_INGESTION_ROLE"
  privilege: 
    - "USAGE"
    - "CREATE SCHEMA"

- database: "PROD_RAW"
  role: "PROD_TRANSFORMER_ROLE"
  privilege: 
    - "USAGE"

# PROD_ANALYTICS
- database: "PROD_ANALYTICS"
  role: "PROD_TRANSFORMER_ROLE"
  privilege: 
    - "USAGE"
    - "CREATE SCHEMA"

- database: "PROD_ANALYTICS"
  role: "PROD_REPORTING_ROLE"
  privilege: 
    - "USAGE"