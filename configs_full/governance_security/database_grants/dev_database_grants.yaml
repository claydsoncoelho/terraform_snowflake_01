# configs/governance_security/database_grants/dev_database_grants.yaml

# This file defines the database grants for various roles in the system.
# Each entry specifies the database, role, and the privilege granted to that role for the specified database.
# The privileges can include "ALL PRIVILEGES", "USAGE", or other specific privileges as needed.

# DEV ENVIRONMENT GRANTS
# DEV_RAW
- database: "DEV_RAW"
  role: "DEV_INGESTION_ROLE"
  privilege: 
    - "USAGE"
    - "CREATE SCHEMA"

- database: "DEV_RAW"
  role: "DEV_TRANSFORMER_ROLE"
  privilege: 
    - "USAGE"

# DEV_ANALYTICS
- database: "DEV_ANALYTICS"
  role: "DEV_TRANSFORMER_ROLE"
  privilege: 
    - "USAGE"
    - "CREATE SCHEMA"

- database: "DEV_ANALYTICS"
  role: "DEV_REPORTING_ROLE"
  privilege: 
    - "USAGE"