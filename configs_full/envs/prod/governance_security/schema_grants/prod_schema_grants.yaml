# configs/governance_security/schema_grants/prod_schema_grants.yaml

# This file defines the database grants for various roles in the system.
# Each entry specifies the database, schema, role, and the privilege granted to that role for the specified schema.
# The privileges can include "ALL PRIVILEGES", "USAGE", or other specific privileges as needed.

# PROD_RAW
- database: "PROD_RAW"
  schema: "LANDING"
  role: "PROD_INGESTION_ROLE"
  privilege: 
    - "USAGE"
    - "CREATE TABLE"
    - "CREATE VIEW"
    - "CREATE FILE FORMAT"
    - "CREATE STAGE"
    - "CREATE PIPE"
    - "CREATE SEQUENCE"
    - "CREATE FUNCTION"
    - "CREATE PROCEDURE"
    - "CREATE STREAM"
    - "CREATE TASK"
    - "CREATE MATERIALIZED VIEW"

- database: "PROD_RAW"
  schema: "LANDING"
  role: "PROD_TRANSFORMER_ROLE"
  privilege: 
    - "USAGE"

