# configs/envs/prod/governance_security/database_grants/database_grants.yaml

# PROD ENVIRONMENT GRANTS
# PROD_RAW
- database: "PROD_RAW"
  role: "PROD_INGESTION_ROLE"
  privilege: 
    - "USAGE"
    - "CREATE SCHEMA"
- database: "PROD_RAW"
  role: "PROD_TRANSFORMER_ROLE"
  privilege: 
    - "USAGE"

# PROD_ANALYTICS
- database: "PROD_ANALYTICS"
  role: "PROD_TRANSFORMER_ROLE"
  privilege: 
    - "USAGE"
    - "CREATE SCHEMA"
- database: "PROD_ANALYTICS"
  role: "PROD_REPORTING_ROLE"
  privilege: 
    - "USAGE"

# PROD roles for the PLATFORM_DATA_MANAGEMENT database
- database: "PLATFORM_DATA_MANAGEMENT"
  role: "PROD_INGESTION_ROLE"
  privilege: 
    - "USAGE"
- database: "PLATFORM_DATA_MANAGEMENT"
  role: "PROD_TRANSFORMER_ROLE"
  privilege: 
    - "USAGE"
- database: "PLATFORM_DATA_MANAGEMENT"
  role: "PROD_REPORTING_ROLE"
  privilege: 
    - "USAGE"