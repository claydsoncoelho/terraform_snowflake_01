# configs/envs/prod/governance_security/database_grants/database_grants.yaml

# IMPORTANT: Check if your configuration references objects outside of the current environment. 
# For example, PLATFORM_DATA_MANAGEMENT.

# PROD_RAW
- database: "PROD_RAW"
  role: "PROD_INGESTION_ROLE"
  privilege: 
    - "USAGE"
    - "CREATE SCHEMA"
  all_schemas:
    - "USAGE"
  future_schemas:
    - "USAGE"

- database: "PROD_RAW"
  role: "PROD_TRANSFORMER_ROLE"
  privilege: 
    - "USAGE"
  all_schemas:
    - "USAGE"
  future_schemas:
    - "USAGE"

# PROD_ANALYTICS
- database: "PROD_ANALYTICS"
  role: "PROD_TRANSFORMER_ROLE"
  privilege: 
    - "USAGE"
    - "CREATE SCHEMA"
  all_schemas:
    - "USAGE"
  future_schemas:
    - "USAGE"

- database: "PROD_ANALYTICS"
  role: "PROD_REPORTING_ROLE"
  privilege: 
    - "USAGE"
  all_schemas:
    - "USAGE"
  future_schemas:
    - "USAGE"

