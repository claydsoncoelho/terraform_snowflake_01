# configs/envs/common/compute/warehouses.yaml

- name: "WH_INGESTION"
  comment: "Compute warehouse for ROLE_WH_INGESTION"
  size: "X-SMALL"
  auto_resume: true
  auto_suspend_seconds: 600
  max_cluster_count: 4
  min_cluster_count: 1
  initially_suspended: true
  enable_query_acceleration: true
  query_acceleration_max_scale_factor: 8

- name: "WH_TRANSFORM"
  comment: "Compute warehouse for dbt transformations"
  size: "X-SMALL"
  auto_resume: true
  auto_suspend_seconds: 300
  max_cluster_count: 2
  min_cluster_count: 1
  initially_suspended: true
  enable_query_acceleration: false
  query_acceleration_max_scale_factor: 0